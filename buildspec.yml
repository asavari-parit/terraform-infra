version: 0.2

phases:
  install:
    commands:
      - yum install -y unzip
      - curl -O https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
      - unzip terraform_1.8.5_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform --version

  build:
    commands:
      - terraform init
      - terraform validate
      - terraform plan
      - terraform apply -auto-approve
